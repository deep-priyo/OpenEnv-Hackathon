name: code-review-environment
version: "2.0.0"
description: Code review environment with 3 progressive tasks

deterministic: true

environment:
  class: CodeReviewEnvironment
  module: backend.environment  # ✅ Points to backend/environment/
  init_args:
    use_dynamic_snippets: false

tasks:
  - id: 1
    name: Bug Detection
    difficulty: easy
    max_steps: 3
    grader: BugDetectionGrader
    grader_module: backend.environment.tasks  # ✅ MUST be this path
    
  - id: 2
    name: Bug Classification
    difficulty: medium
    max_steps: 6
    grader: BugClassificationGrader
    grader_module: backend.environment.tasks  # ✅ MUST be this path
    
  - id: 3
    name: Fix Suggestion
    difficulty: hard
    max_steps: 4
    grader: FixSuggestionGrader
    grader_module: backend.environment.tasks  # ✅ MUST be this path

api:
  port: 7860