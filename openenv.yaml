name: code-review-environment
version: 2.0.0
description: OpenEnv RL environment for AI code review agents

environment:
  class: CodeReviewEnvironment
  module: backend
  endpoints:
    reset: POST /reset
    step: POST /step
    state: GET /state
    health: GET /health
    grade: /grader

tasks:
  - id: easy
    name: Bug Detection
    difficulty: easy
    description: Detect whether this code has a bug. Use detect_bug if you find one, or skip if code is clean.
    grader: "grader.civerse_graders:EasyGrader"
    baseline_score: 0.80
    reward_range: [0.0, 1.0]
    max_steps: 3

  - id: medium
    name: Bug Classification
    difficulty: medium
    description: Find ALL bugs and classify their type and severity correctly.
    grader: "grader.civerse_graders:MediumGrader"
    baseline_score: 0.50
    reward_range: [0.0, 1.0]
    max_steps: 6

  - id: hard
    name: Fix Suggestion
    difficulty: hard
    description: Suggest a detailed fix for the bug with explanation.
    grader: "grader.civerse_graders:HardGrader"
    baseline_score: 0.30
    reward_range: [0.0, 1.0]
    max_steps: 4

observation_space:
  current_task: int
  task_description: str
  code: str
  filename: str
  step_count: int
  max_steps: int
  total_bugs: int
  bugs_found_so_far: int

action_space:
  action_type:
    type: enum
    values: [detect_bug, classify_severity, suggest_fix, review, explain, skip]
  confidence:
    type: float
    range: [0.0, 1.0]
  explanation:
    type: str

inference:
  script: "inference.py"
  env_vars:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN