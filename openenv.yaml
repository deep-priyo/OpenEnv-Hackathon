name: code-review-environment
version: 2.0.0
description: OpenEnv RL environment for AI code review agents

environment:
  class: CodeReviewEnvironment
  module: backend
  endpoints:
    reset: POST /reset
    step: POST /step
    state: GET /state
    health: GET /health

tasks:
  - id: 1
    name: Bug Detection
    difficulty: easy
    description: Detect whether this code has a bug. Use detect_bug if you find one, or skip if code is clean.
    grader: BugDetectionGrader
    grader_module: backend.environment.tasks
    reward_range: [0.0, 1.0]
    max_steps: 3

  - id: 2
    name: Bug Classification
    difficulty: medium
    description: Find ALL bugs and classify their type and severity correctly.
    grader: BugClassificationGrader
    grader_module: backend.environment.tasks
    reward_range: [0.0, 1.0]
    max_steps: 6

  - id: 3
    name: Fix Suggestion
    difficulty: hard
    description: Suggest a detailed fix for the bug with explanation.
    grader: FixSuggestionGrader
    grader_module: backend.environment.tasks
    reward_range: [0.0, 1.0]
    max_steps: 4

observation_space:
  current_task: int
  task_description: str
  code: str
  filename: str
  step_count: int
  max_steps: int
  total_bugs: int
  bugs_found_so_far: int

action_space:
  action_type:
    type: enum
    values: [detect_bug, classify_severity, suggest_fix, review, explain, skip]
  confidence:
    type: float
    range: [0.0, 1.0]
  explanation:
    type: str

inference:
  script: inference.py
  model_env: MODEL_NAME
  api_base_env: API_BASE_URL
  token_env: HF_TOKEN