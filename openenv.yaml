spec_version: 1
name: code-review-env
type: space
runtime: fastapi
app: server.app:app
port: 7860

description: >
  Code Review Environment
version: "2.0.0"
author: "CR Team"
tags: [openenv, code-review]

endpoints:
  health: /health
  reset:  /reset
  step:   /step
  state:  /state
  grade:  /grader

action_space:
  type: discrete
  actions:
    - name: detect
    - name: classify
    - name: fix
    - name: skip

observation_space:
  code: string
  task_id: string
  step: int

tasks:
  - id: easy
    difficulty: easy
    description: 1 bug (e.g., syntax or simple logic)
    max_steps: 15
    grader: "grader.code_review_graders:EasyGrader"
    baseline_score: 0.8

  - id: medium
    difficulty: medium
    description: 2-3 bugs (logic + edge cases)
    max_steps: 15
    grader: "grader.code_review_graders:MediumGrader"
    baseline_score: 0.5

  - id: hard
    difficulty: hard
    description: 3-5 bugs (security + logic + performance)
    max_steps: 15
    grader: "grader.code_review_graders:HardGrader"
    baseline_score: 0.3

  - id: expert
    difficulty: expert
    description: 3-5 complex bugs
    max_steps: 15
    grader: "grader.code_review_graders:ExpertGrader"
    baseline_score: 0.2

scoring:
  reward_range: [-1.0, 1.0]
  grader_range: [0.01, 0.99]
  success_threshold: 0.50
  score_formula: deterministic_grader
  components:
    - detection_accuracy: 0.33
    - classification_accuracy: 0.33
    - fix_quality: 0.34

constraints:
  max_runtime_seconds: 1800
  max_memory_gb: 8
  max_vcpu: 2

inference:
  script: "inference.py"
  env_vars:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
